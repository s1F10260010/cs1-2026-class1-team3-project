    <h1>おすすめチェーン店の紹介</h1>
    <h2>スシロー</h2>
        <p>鮮度抜群のネタと豊富なメニューで大人から子どもまで楽しめる、人気No.1の回転寿司チェーン。</p>
    <h2>すき家</h2>
        <p>チーズやキムチなど多彩なトッピングが魅力の、店舗数日本一を誇る牛丼チェーン。</p>
    <h2>丸亀製麺</h2>
        <p>すべての店舗で粉から打つ「打ちたて」にこだわった讃岐うどん専門店。</p>
    <h2>サイゼリヤ</h2>
        <p>ミラノ風ドリアをはじめ、本場のイタリアンを圧倒的な低価格で楽しめるカジュアルレストラン。</p>
